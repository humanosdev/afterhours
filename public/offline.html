<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AfterHours Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0e0e12;
        color: #f4f4f5;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .card {
        width: min(420px, calc(100vw - 32px));
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 16px;
        background: #15151b;
        padding: 20px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p {
        margin: 0;
        color: #a1a1aa;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You're offline</h1>
      <p>AfterHours will sync when your connection returns.</p>
    </main>
  </body>
</html>
